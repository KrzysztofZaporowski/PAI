{% extends "base.html" %}

{% block title %}Potwierdź usunięcie{% endblock %}

{% block content %}
    <h2>Potwierdź usunięcie</h2>
    <p>Czy na pewno chcesz usunąć {{ object_type }} <strong>{{ object_description }}</strong>?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger" onclick="return confirmAction('Ostateczne potwierdzenie: dane zostaną trwale usunięte.')">Tak, usuń trwale</button>
        <a href="{{ cancel_url }}" class="btn btn-secondary">Anuluj</a>
    </form>
{% endblock %}
