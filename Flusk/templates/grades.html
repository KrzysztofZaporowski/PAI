<!doctype html>
<html lang="pl">

<head>
  <meta charset="utf-8" />
  <title>Oceny studentów</title>
</head>

<body>
  <h1>Oceny studentów</h1>
  {% if students %}
  <table border="1">
    <thead>
      <tr>
        <th>#</th>
        <th>Imię i nazwisko</th>
        <th>Numer albumu</th>
        <th>Ocena</th>
        <th>Uwagi</th>
      </tr>
    </thead>
    <tbody>
      {% for student in students %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.index_number }}</td>
        <td>{{ student.grade }}</td>
        <td>{{ student.notes or "-" }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p>Brak danych do wyświetlenia.</p>
  {% endif %}
</body>

</html>
